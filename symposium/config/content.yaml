  如何设计一个能够自我进化的知识库？
  应用背景：GPU Kernel Design 的自动优化系统

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  🖥️  应用背景：GPU Kernel Design
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  用户原始代码（如 PyTorch）注重功能性，但在 GPU 上的实际性能往往未被充分优化。
  GPU Kernel Design 的任务是：在保证正确性的前提下，不断发现并应用优化策略，
  提升 Kernel 的运行速度（throughput / latency）。

  这个过程会积累大量 Knowledge（优化策略、Trajectory、Experience），
  这些 Knowledge 构成了系统的"知识库"。随着经验积累，知识库需要能够自我进化。

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  📐 预设假设（由裁判给定，不可更改，只可澄清）
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  存储与写入机制：
  - 所有 Knowledge Unit 存储在文件系统上
  - Copy-on-Write：永远不修改旧卡片的内容。需要更新时，
    产生一张新卡片，旧卡片保留原样
  - Append-only：所有写入操作只追加，不覆盖

  Knowledge Unit 的基本属性：
  - 每张卡片有唯一 UUID
  - 卡片之间可以建立关系和关联（Relationship / Link）
  - 卡片拥有完整生命周期状态：

    Created    → 新建
    Revised    → Copy-on-Write 修订，产生新卡片，旧卡片保留
    Merged     → 多张卡片合并为一张新卡片
    Split      → 一张卡片拆分为多张新卡片
    Superseded → 被更新版本取代
    Archived   → 失去当前有效性（含重复等情况），归档保存

  以上是辩论的前提，不是辩论内容。

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  ❓ 两个核心问题（贯穿全场）
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  问题一：进化机制
  Knowledge Unit 如何触发进化、完成状态转换？
  触发条件、判断标准、执行流程是什么？

  问题二：反馈机制（最重要）
  在总知识量受限的情况下，如何设计反馈机制，
  确保每一次进化操作是净进化而非净退化？

  三大核心挑战（必须正面回应）：

  挑战一：局部改变的全局影响难以判定
  在 GPU Kernel 优化中，学到的一条新 Knowledge 可能只改变一两个优化点。
  但这一两个改变是否对全局性能产生影响？很难立即知道。
  因为全局影响往往需要经过大量后续步骤才能慢慢体现。
  如何在"短期局部可观测信号"与"长期全局效果"之间建立可靠的判定机制？

  挑战二：Ablation Study 的成本与 delta 的真实性
  针对少量 Knowledge 变化，消融实验（Ablation Study）是可行的；
  但数量大时成本急剧上升。更关键的是：
  并非所有小的 Knowledge 改变都能产生 real delta——
  有些实验跑完后发现根本没有显著差异。
  对这些"无效实验"，系统如何处理、如何学习？
  以及：做多少 Ablation 才够？如何在成本与验证覆盖之间设计权衡？

  挑战三：Hypothesis 理解深度不足时的主动实验设计
  有时系统只能得到一个运行速度数字，却不知道为什么快了。
  真正的 Hypothesis（为什么这个优化有效）如果没被理解，
  对未来的系统提升帮助有限。
  当现有经验深度不足时，系统能否主动设计新实验来 validate / verify Hypothesis？
  关键设计问题：
  - 新实验可以是 sub-hypothesis，甚至递归产生孙 hypothesis；
  - 但每次产生新实验都有成本（计算资源、时间、知识容量）；
  - 哪些实验是 no-regret 的（验证收益稳定）？
  - 哪些是 costly 且收益不确定的（高成本、低期望 delta）？
  - 如何设计系统使其能够：判断何时需要主动实验、
    评估实验的必要性与合理性、并在资源受限下做出最优权衡？

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  🏆 评判标准
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  哪个方案能在 GPU Kernel Design 这个具体背景下，
  真正解释并实现知识库的进化能力？
  评判重点：具体性（数学/工程）、对三大挑战的回应深度。

