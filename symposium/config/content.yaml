  📐 预设假设（由裁判给定，不可更改，只可澄清）
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  存储与写入机制：
  - 所有 Knowledge Unit 存储在文件系统上
  - Copy-on-Write：永远不修改旧卡片的内容。需要更新时，
    产生一张新卡片，旧卡片保留原样
  - Append-only：所有写入操作只追加，不覆盖

  Knowledge Unit 的基本属性：
  - 每张卡片有唯一 UUID
  - 卡片之间可以建立关系和关联（Relationship / Link）
  - 卡片拥有完整生命周期状态：

    Created    → 新建
    Revised    → Copy-on-Write 修订，产生新卡片，旧卡片保留
    Merged     → 多张卡片合并为一张新卡片
    Split      → 一张卡片拆分为多张新卡片
    Superseded → 被更新版本取代
    Archived   → 失去当前有效性（含重复等情况），归档保存

  以上是辩论的前提，不是辩论内容。

