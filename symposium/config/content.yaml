  问题一：演化机制
  Knowledge Unit 如何在生命周期中完成状态转换？
  触发条件、判断标准、执行流程是什么？

  问题二：反馈机制（最重要）
  在总知识量受限的情况下，如何设计反馈机制，
  确保每一次演化操作是净进化而非净退化？
  - 如何从数学上保证知识库随经验积累变得更切合目标？
  - 用什么指标衡量知识库在变好还是变坏？
  - 资源受限时，如何决定哪些知识该留、该合并、该废弃？

